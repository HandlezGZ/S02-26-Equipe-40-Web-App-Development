spring:
  application:
    name: authservice-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/authservice}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

server:
  port: ${SERVER_PORT:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-}]"

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    issuer: ${JWT_ISSUER:authservice-api}
  oauth2:
    success-redirect-uri: ${OAUTH2_SUCCESS_REDIRECT_URI:http://localhost:5173/auth/callback}
    failure-redirect-uri: ${OAUTH2_FAILURE_REDIRECT_URI:http://localhost:5173/login}
  conversionflow:
    base-url: ${CONVERSIONFLOW_BASE_URL:http://localhost:8080}
    api-key: ${CONVERSIONFLOW_API_KEY:}
    timeout-ms: ${CONVERSIONFLOW_TIMEOUT_MS:2000}
    retry-max-attempts: ${CONVERSIONFLOW_RETRY_MAX_ATTEMPTS:3}
    retry-backoff-ms: ${CONVERSIONFLOW_RETRY_BACKOFF_MS:200}
    circuit-failure-threshold: ${CONVERSIONFLOW_CIRCUIT_FAILURE_THRESHOLD:5}
    circuit-open-ms: ${CONVERSIONFLOW_CIRCUIT_OPEN_MS:30000}
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}
    max-attempts: ${OUTBOX_MAX_ATTEMPTS:5}
    base-backoff-ms: ${OUTBOX_BASE_BACKOFF_MS:1000}
    exchange: ${OUTBOX_EXCHANGE:auth.events}
    routing-key: ${OUTBOX_ROUTING_KEY:user.registered.v1}
